<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>Agenda</title>
<meta name="description" content="Planificator personal" />
<meta name="theme-color" content="#F5F3EE" id="theme-color-meta" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Agenda" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #F5F3EE; font-family: 'Inter', system-ui, sans-serif; overscroll-behavior: none; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  button { font-family: inherit; }
  input, textarea { font-family: inherit; }
  input::placeholder, textarea::placeholder { color: #a8a39a; }
  #root { height: 100%; width: 100%; max-width: 520px; margin: 0 auto; position: relative; }
  @media (min-width: 521px) {
    body { background: #E5E1D8; }
    #root { box-shadow: 0 0 0 1px rgba(0,0,0,0.06); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script src="js/data.js"></script>
<script type="text/babel" data-presets="react" src="js/primitives.jsx"></script>
<script type="text/babel" data-presets="react" src="js/screens-main.jsx"></script>
<script type="text/babel" data-presets="react" src="js/screens-secondary.jsx"></script>
<script type="text/babel" data-presets="react" src="js/app.jsx"></script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
